<svg viewBox="0 0 920 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <title id="t">NetSentry threat-detection pipeline</title>
  <desc id="d">Sensors (DNS, ARP, open ports, 802.11 frames, router config) feed pure detectors that emit findings with stable NS-XXX-NNN ids and a severity; findings are de-duplicated by kind and subject and gated by per-scan policy; survivors go out as Telegram alerts with an explain link, to the web dashboard, and into the daily report.</desc>
  <rect x="0" y="0" width="920" height="520" rx="18" fill="#0e1420"/>
  <text x="34" y="46" font-size="23" font-weight="700" fill="#e7ebf3">NetSentry — threat-detection pipeline</text>
  <text x="34" y="72" font-size="13.5" fill="#808aa0">passive + active sensors → named findings → one clear alert</text>

  <!-- severity legend -->
  <g font-size="11.5" fill="#aeb6c9">
    <circle cx="600" cy="42" r="5" fill="#f0768a"/><text x="610" y="46">attack</text>
    <circle cx="672" cy="42" r="5" fill="#f2a06a"/><text x="682" y="46">warning</text>
    <circle cx="752" cy="42" r="5" fill="#6bb6f0"/><text x="762" y="46">info</text>
  </g>

  <!-- Stage 1: sensors -->
  <text x="30" y="106" font-size="12" font-weight="700" fill="#8f86ea">① SENSORS</text>
  <rect x="28" y="114" width="172" height="360" rx="12" fill="#171d2b" stroke="#2c3446"/>
  <g font-size="12" fill="#dfe4ef">
    <rect x="44" y="150" width="140" height="42" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="58" y="170">DNS queries</text><text x="58" y="185" font-size="10" fill="#808aa0">Pi-hole log</text>
    <rect x="44" y="204" width="140" height="42" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="58" y="224">ARP table</text><text x="58" y="239" font-size="10" fill="#808aa0">router neighbours</text>
    <rect x="44" y="258" width="140" height="42" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="58" y="278">Open ports</text><text x="58" y="293" font-size="10" fill="#808aa0">on-demand nmap</text>
    <rect x="44" y="312" width="140" height="42" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="58" y="332">802.11 frames</text><text x="58" y="347" font-size="10" fill="#808aa0">monitor-mode radio</text>
    <rect x="44" y="366" width="140" height="42" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="58" y="386">Router config</text><text x="58" y="401" font-size="10" fill="#808aa0">export snapshot</text>
  </g>

  <!-- Stage 2: detectors -->
  <text x="234" y="106" font-size="12" font-weight="700" fill="#8f86ea">② DETECTORS → NAMED FINDINGS</text>
  <rect x="232" y="114" width="256" height="360" rx="12" fill="#171d2b" stroke="#2c3446"/>
  <g font-size="12" fill="#e7ebf3">
    <rect x="246" y="132" width="228" height="60" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="260" y="152" font-weight="600">NS-DNS</text>
    <circle cx="330" cy="148" r="4" fill="#f0768a"/><circle cx="344" cy="148" r="4" fill="#f0768a"/><circle cx="358" cy="148" r="4" fill="#6bb6f0"/>
    <text x="260" y="176" font-size="10.5" fill="#aeb6c9">known-malware · DGA/tunnel · new domain</text>

    <rect x="246" y="198" width="228" height="52" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="260" y="218" font-weight="600">NS-ARP</text>
    <circle cx="330" cy="214" r="4" fill="#f0768a"/><circle cx="344" cy="214" r="4" fill="#f0768a"/>
    <text x="260" y="238" font-size="10.5" fill="#aeb6c9">spoofing · MAC/identity change</text>

    <rect x="246" y="256" width="228" height="52" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="260" y="276" font-weight="600">NS-EXP</text>
    <circle cx="330" cy="272" r="4" fill="#f2a06a"/><circle cx="344" cy="272" r="4" fill="#f0768a"/>
    <text x="260" y="296" font-size="10.5" fill="#aeb6c9">new open port · weak / default creds</text>

    <rect x="246" y="314" width="228" height="52" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="260" y="334" font-weight="600">NS-WIFI</text>
    <circle cx="330" cy="330" r="4" fill="#f0768a"/><circle cx="344" cy="330" r="4" fill="#f0768a"/><circle cx="358" cy="330" r="4" fill="#6bb6f0"/>
    <text x="260" y="354" font-size="10.5" fill="#aeb6c9">deauth · evil-twin · deauth-nearby</text>

    <rect x="246" y="372" width="228" height="52" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="260" y="392" font-weight="600">NS-CFG</text>
    <circle cx="330" cy="388" r="4" fill="#f2a06a"/>
    <text x="260" y="412" font-size="10.5" fill="#aeb6c9">router config changed / tampered</text>
  </g>
  <text x="246" y="446" font-size="10.5" fill="#808aa0">pure functions · unit-tested · each id is stable + documented</text>

  <!-- Stage 3: policy -->
  <text x="520" y="106" font-size="12" font-weight="700" fill="#8f86ea">③ DEDUP + POLICY</text>
  <rect x="518" y="114" width="150" height="360" rx="12" fill="#171d2b" stroke="#2c3446"/>
  <g font-size="11.5" fill="#dfe4ef">
    <rect x="532" y="150" width="122" height="60" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="546" y="176">dedup by</text><text x="546" y="194" font-size="10.5" fill="#808aa0">(kind, subject)</text>
    <rect x="532" y="224" width="122" height="60" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="546" y="250">per-scan</text><text x="546" y="268" font-size="10.5" fill="#808aa0">enable / disable</text>
    <rect x="532" y="298" width="122" height="60" rx="8" fill="#1e2636" stroke="#2c3446"/><text x="546" y="324">severity →</text><text x="546" y="342" font-size="10.5" fill="#808aa0">retention window</text>
  </g>
  <text x="532" y="392" font-size="10.5" fill="#3dd08f">no repeat spam</text>
  <text x="532" y="410" font-size="10.5" fill="#3dd08f">for the same thing</text>

  <!-- Stage 4: outputs -->
  <text x="700" y="106" font-size="12" font-weight="700" fill="#8f86ea">④ OUTPUTS</text>
  <rect x="698" y="114" width="194" height="360" rx="12" fill="#171d2b" stroke="#2c3446"/>
  <g font-size="12" fill="#e7ebf3">
    <rect x="712" y="150" width="166" height="72" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="726" y="172" font-weight="600">Telegram alert</text>
    <text x="726" y="190" font-size="10.5" fill="#aeb6c9">icon + NS-id</text>
    <text x="726" y="206" font-size="10.5" fill="#6bb6f0">🔎 one-click explain</text>
    <rect x="712" y="236" width="166" height="60" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="726" y="258" font-weight="600">Web dashboard</text>
    <text x="726" y="276" font-size="10.5" fill="#aeb6c9">live devices + findings</text>
    <rect x="712" y="310" width="166" height="60" rx="8" fill="#1e2636" stroke="#2c3446"/>
    <text x="726" y="332" font-weight="600">Daily report</text>
    <text x="726" y="350" font-size="10.5" fill="#aeb6c9">at-a-glance verdict</text>
  </g>

  <!-- arrows -->
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8f86ea"/></marker>
  </defs>
  <line x1="202" y1="294" x2="230" y2="294" stroke="#8f86ea" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="490" y1="294" x2="516" y2="294" stroke="#8f86ea" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="670" y1="294" x2="696" y2="294" stroke="#8f86ea" stroke-width="2.5" marker-end="url(#a)"/>
</svg>