name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # attach artifacts to the release
  id-token: write        # keyless signing via Sigstore/OIDC
  attestations: write    # record the provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions + SBOM
        run: |
          python -m pip install --upgrade pip build cyclonedx-bom
          python -m build
          pip install .
          cyclonedx-py environment -o sbom.cdx.json

      - name: Attest build provenance (signed)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"

      - name: Attach artifacts to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            sbom.cdx.json
